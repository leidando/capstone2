databases:
  - name: cswdo_db
    databaseName: cswdo_system
    user: cswdo_admin
    plan: free # Change this if you have a paid plan

services:
  - type: web
    name: cswdo-management-system
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn cswdo_system.wsgi:application
    plan: free # Change this if you have a paid plan
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cswdo_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "cswdo-management-system.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://cswdo-management-system.onrender.com"
